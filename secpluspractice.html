<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CompTIA Security+ Exam Simulator</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .flagged { border: 2px solid #f59e0b !important; background-color: #fef3c7; }
        .answered { background-color: #3b82f6; color: white; }
        .current { ring: 4px; ring-color: #10b981; border: 2px solid #059669 !important; }
        body { background-color: #f3f4f6; font-family: 'Inter', sans-serif; }
    </style>
</head>
<body class="h-screen flex flex-col">

    <header class="bg-slate-800 text-white p-4 flex justify-between items-center shadow-lg">
        <h1 class="text-xl font-bold underline decoration-sky-500">Security+ Simulation (SY0-701)</h1>
        <div id="timer" class="text-2xl font-mono bg-slate-900 px-4 py-1 rounded border border-slate-600">60:00</div>
    </header>

    <div class="flex flex-1 overflow-hidden">
        <aside class="w-72 bg-white border-r border-slate-300 overflow-y-auto p-4 hidden md:block">
            <h2 class="text-sm font-semibold text-slate-500 uppercase mb-4">Question Map</h2>
            <div id="question-map" class="grid grid-cols-5 gap-2"></div>
            <div class="mt-8 space-y-2">
                <div class="flex items-center text-xs text-slate-600"><span class="w-3 h-3 bg-blue-500 mr-2 rounded"></span> Answered</div>
                <div class="flex items-center text-xs text-slate-600"><span class="w-3 h-3 border-2 border-orange-400 bg-amber-100 mr-2 rounded"></span> Flagged</div>
            </div>
        </aside>

        <main class="flex-1 overflow-y-auto p-6 flex flex-col items-center">
            <div id="quiz-container" class="max-w-3xl w-full bg-white p-8 rounded-xl shadow-sm border border-slate-200"></div>

            <div class="max-w-3xl w-full mt-6 flex justify-between items-center">
                <button onclick="prevQuestion()" id="prev-btn" class="px-6 py-2 bg-slate-200 text-slate-700 rounded-lg hover:bg-slate-300 disabled:opacity-50">Previous</button>
                <button onclick="toggleFlag()" class="px-6 py-2 border-2 border-orange-400 text-orange-600 rounded-lg hover:bg-orange-50 font-semibold">Flag for Review</button>
                <button onclick="nextQuestion()" id="next-btn" class="px-6 py-2 bg-sky-600 text-white rounded-lg hover:bg-sky-700">Next</button>
                <button onclick="finishExam()" id="finish-btn" class="hidden px-6 py-2 bg-red-600 text-white rounded-lg hover:bg-red-700 font-bold">Submit Exam</button>
            </div>
        </main>
    </div>

    <div id="results-modal" class="fixed inset-0 bg-slate-900/80 hidden items-center justify-center p-4 z-50">
        <div class="bg-white p-8 rounded-2xl max-w-md w-full text-center">
            <h2 id="pass-fail-text" class="text-3xl font-black mb-2">RESULT</h2>
            <p id="final-score" class="text-5xl font-mono text-slate-800 my-4">0/900</p>
            <p id="score-details" class="text-slate-500 mb-6"></p>
            <button onclick="closeResults()" class="w-full py-3 bg-sky-600 text-white rounded-xl font-bold shadow-lg">Review Answers</button>
            <button onclick="resetExam()" class="w-full mt-2 py-3 text-slate-400 hover:text-slate-600 underline">Retake Exam</button>
        </div>
    </div>

    <script>
        // Use only ONE declaration for examData
        const examData = [
            { id: 1, domain: "Threats, Attacks, and Vulnerabilities", question: "An administrator is investigating a breach where an attacker gained access to a server by using a known vulnerability that had a patch available for six months. Which of the following best describes this weakness?", options: ["Zero-day vulnerability", "Legacy platform", "Unpatched software", "Default configuration"], correctIndex: 2, reasoning: "Failing to apply available security updates leaves known vulnerabilities open to exploitation." },
            { id: 2, domain: "Architecture and Design", question: "A security analyst needs to implement a solution that provides centralized authentication for a wireless network. Which of the following protocols is most appropriate?", options: ["RADIUS", "SNMP", "DNSSEC", "SFTP"], correctIndex: 0, reasoning: "Remote Authentication Dial-In User Service (RADIUS) provides centralized AAA management for users connecting to a network." },
            { id: 3, domain: "Threats, Attacks, and Vulnerabilities", question: "Users are reporting that they are being redirected to a malicious website when typing in a valid URL. The security team discovers the local hosts file on the users' machines has been modified. What type of attack is this?", options: ["Phishing", "DNS Poisoning", "Pharming", "Whaling"], correctIndex: 2, reasoning: "Pharming redirects traffic to a fraudulent website by compromising host files or DNS caches." },
            { id: 4, domain: "Implementation", question: "A company wants to ensure that employees cannot use their corporate laptops for personal web browsing while working from home. Which of the following would be the most effective solution?", options: ["Host-based firewall", "SWG (Secure Web Gateway)", "NIPS", "DLP"], correctIndex: 1, reasoning: "A Secure Web Gateway provides web filtering and security policies for users regardless of their location." },
            { id: 5, domain: "Implementation", question: "An organization is adopting a policy where employees use their own mobile devices for work. Which of the following technologies allows the company to manage only the work-related data on these devices?", options: ["Full Device Encryption", "Containerization", "Geofencing", "Remote Wipe"], correctIndex: 1, reasoning: "Containerization creates a virtual 'silo' for corporate apps and data, keeping them separate from personal content." },
            { id: 6, domain: "Architecture and Design", question: "A network administrator needs to prevent loops in a Layer 2 switched environment. Which of the following should be enabled?", options: ["BGP", "STP", "VLAN tagging", "OSPF"], correctIndex: 1, reasoning: "Spanning Tree Protocol (STP) is specifically designed to prevent switching loops in Ethernet networks." },
            { id: 7, domain: "Governance, Risk, and Compliance", question: "During a risk assessment, a company determines that the cost of a specific security control exceeds the potential loss from the risk. The company decides to take no further action. Which risk response is this?", options: ["Risk Avoidance", "Risk Transference", "Risk Acceptance", "Risk Mitigation"], correctIndex: 2, reasoning: "Risk Acceptance occurs when an organization recognizes a risk but decides to deal with it if it happens rather than spending more than the asset is worth to fix it." },
            { id: 8, domain: "Implementation", question: "A developer is concerned about users entering malicious SQL commands into a web form. Which of the following is the most effective defense?", options: ["Input Validation", "Obfuscation", "Code Signing", "Static Analysis"], correctIndex: 0, reasoning: "Input Validation (and parameterized queries) ensures that input matches expected patterns, preventing injection attacks." },
            { id: 9, domain: "Implementation", question: "A security technician is configuring a new server. They want to ensure that only the necessary network services are running. Which process are they performing?", options: ["Patch Management", "Hardening", "Vulnerability Scanning", "Sandboxing"], correctIndex: 1, reasoning: "System hardening includes removing unnecessary accounts, services, and ports to reduce the attack surface." },
            { id: 10, domain: "Operations and Incident Response", question: "Which of the following is a physical security control that can also help with 'tailgating' prevention?", options: ["Motion Sensor", "Mantrap", "CCTV", "Bollards"], correctIndex: 1, reasoning: "A mantrap uses two interlocking doors to ensure only one person passes at a time, physically stopping tailgaters." },
            { id: 11, domain: "Operations and Incident Response", question: "An organization wants to ensure that even if an attacker steals a user's password, they cannot access the account without a physical device the user possesses. Which of the following should be implemented?", options: ["Complex password policy", "MFA using a hardware token", "Single Sign-On (SSO)", "Password rotation"], correctIndex: 1, reasoning: "Multi-Factor Authentication requires 'something you know' (password) and 'something you have' (token)." },
            { id: 12, domain: "Threats, Attacks, and Vulnerabilities", question: "A security analyst is reviewing logs and sees multiple failed login attempts followed by a successful login from an unusual IP address. Which of the following is the most likely attack?", options: ["Brute force", "Man-in-the-middle", "Replay attack", "Social engineering"], correctIndex: 0, reasoning: "Repeated failed attempts followed by success is a classic signature of a brute force or password-guessing attack." },
            { id: 13, domain: "Architecture and Design", question: "Which of the following cryptographic concepts ensures that the sender of a message cannot later deny having sent it?", options: ["Confidentiality", "Integrity", "Non-repudiation", "Availability"], correctIndex: 2, reasoning: "Non-repudiation, often provided by digital signatures, makes it impossible for a sender to deny their actions." },
            { id: 14, domain: "Architecture and Design", question: "A company is moving its email services to a provider where the provider manages the hardware and the application, while the company only manages user accounts. What cloud model is this?", options: ["IaaS", "PaaS", "SaaS", "Public Cloud"], correctIndex: 2, reasoning: "Software as a Service (SaaS) provides a fully functional application managed by the provider." },
            { id: 15, domain: "Operations and Incident Response", question: "An incident responder finds a suspicious file that appears to be encrypted. They want to determine if the file contains any sensitive strings without executing it. Which tool is most appropriate?", options: ["Strings", "Wireshark", "Nmap", "Metasploit"], correctIndex: 0, reasoning: "The 'strings' command extracts human-readable text from binary files for analysis." },
            { id: 16, domain: "Governance, Risk, and Compliance", question: "A security policy requires that two different people must be involved in completing a high-value financial transaction. Which principle is being applied?", options: ["Least privilege", "Job rotation", "Separation of duties", "Mandatory vacations"], correctIndex: 2, reasoning: "Separation of duties prevents any one individual from having enough power to commit and conceal fraud alone." },
            { id: 17, domain: "Threats, Attacks, and Vulnerabilities", question: "Which of the following describes a 'Logic Bomb'?", options: ["Malware that self-replicates", "A program that executes when a condition is met", "Software that records keystrokes", "A physical device that destroys hardware"], correctIndex: 1, reasoning: "Logic bombs lie dormant until triggered by a specific date, time, or user action." },
            { id: 18, domain: "Architecture and Design", question: "What is the primary purpose of a 'Salt' in password hashing?", options: ["To make the hash shorter", "To prevent rainbow table attacks", "To encrypt the password", "To speed up hashing"], correctIndex: 1, reasoning: "Salting ensures identical passwords have different hashes, rendering pre-computed rainbow tables useless." },
            { id: 19, domain: "Implementation", question: "A company wants to securely connect two branch offices over the internet. Which technology is best suited for this?", options: ["VLAN", "Site-to-Site VPN", "TLS", "WPA3"], correctIndex: 1, reasoning: "A site-to-site VPN creates an encrypted tunnel between two dedicated network gateways over a public network." },
            { id: 20, domain: "Governance, Risk, and Compliance", question: "Which of the following represents the 'I' in the CIA triad?", options: ["Identity", "Integrity", "Insurance", "Identification"], correctIndex: 1, reasoning: "Integrity ensures that data has not been altered by unauthorized parties." },
            { id: 21, domain: "Implementation", question: "A company is concerned about unauthorized individuals plugging their own laptops into empty wall jacks. Which feature should be configured on the switches?", options: ["QoS", "Port Security", "STP", "IP Directed Broadcast"], correctIndex: 1, reasoning: "Port security allows an administrator to limit access to a physical port based on MAC addresses." },
            { id: 22, domain: "Threats, Attacks, and Vulnerabilities", question: "An attacker uses a database of millions of previously cracked passwords to gain access to an account. What is this attack?", options: ["Dictionary attack", "Birthday attack", "Rainbow table attack", "Side-channel attack"], correctIndex: 2, reasoning: "Rainbow tables are pre-computed tables used for reversing cryptographic hash functions." },
            { id: 23, domain: "Governance, Risk, and Compliance", question: "Which of the following describes the 'Recovery Time Objective' (RTO)?", options: ["Maximum data loss tolerable", "Maximum downtime tolerable", "Average time between failures", "Time required to repair"], correctIndex: 1, reasoning: "RTO measures the duration of time within which a business process must be restored after a disaster." },
            { id: 24, domain: "Operations and Incident Response", question: "An alert is triggered when an employee logs in at 3:00 AM from a foreign country. What type of detection is this?", options: ["Signature-based", "Heuristic", "Anomaly-based", "Rule-based"], correctIndex: 2, reasoning: "Anomaly-based detection identifies deviations from an established 'normal' baseline of user behavior." },
            { id: 25, domain: "Implementation", question: "A company wants to ensure that data on mobile devices is unreadable if the device is lost. Which is the most effective?", options: ["Screen lock", "Biometrics", "Full Device Encryption (FDE)", "Remote Wipe"], correctIndex: 2, reasoning: "FDE ensures data at rest is encrypted and unreadable without the proper key, regardless of physical access." },
            { id: 26, domain: "Operations and Incident Response", question: "Which should be collected FIRST based on the 'Order of Volatility'?", options: ["Hard Disk Drive", "System RAM", "Archival backups", "Network cabling"], correctIndex: 1, reasoning: "System RAM is highly volatile and lost when power is removed, so it must be captured first." },
            { id: 27, domain: "Operations and Incident Response", question: "What is the primary difference between a Vulnerability Scan and a Penetration Test?", options: ["Scan is manual, pen test is automated", "Scan identifies weaknesses; pen test exploits them", "Pen test is only internal", "Scan is more expensive"], correctIndex: 1, reasoning: "Scans are passive identification tools; pen tests are active attempts to exploit weaknesses." },
            { id: 28, domain: "Threats, Attacks, and Vulnerabilities", question: "An attack where a browser automatically submits a request to a different site using a user's active session is called:", options: ["XSS", "CSRF", "SQL Injection", "Session Hijacking"], correctIndex: 1, reasoning: "Cross-Site Request Forgery (CSRF) tricks a browser into performing unwanted actions on a site where the user is authenticated." },
            { id: 29, domain: "Implementation", question: "Which protocol provides secure, encrypted terminal access to a remote Linux server?", options: ["Telnet", "SSH", "FTP", "RDP"], correctIndex: 1, reasoning: "Secure Shell (SSH) provides an encrypted channel for command-line access (Port 22)." },
            { id: 30, domain: "Governance, Risk, and Compliance", question: "What is the primary benefit of a 'Hot Site'?", options: ["Least expensive", "Near-zero downtime recovery", "Same building as primary", "Requires manual hardware install"], correctIndex: 1, reasoning: "Hot sites are fully configured mirrors of the data center, allowing for immediate failover." },
            { id: 31, domain: "Governance, Risk, and Compliance", question: "Which describes 'Least Privilege'?", options: ["No network access", "Minimum access required for the job", "Full admin rights for everyone", "Seniority-based access"], correctIndex: 1, reasoning: "Least privilege limits a user's access to only what is necessary for their specific role." },
            { id: 32, domain: "Implementation", question: "Which device is best suited to block all incoming traffic from a specific IP address?", options: ["Switch", "Firewall", "Hub", "Access Point"], correctIndex: 1, reasoning: "Firewalls filter traffic based on rules, including source and destination IP addresses." },
            { id: 33, domain: "Architecture and Design", question: "Which encryption uses a public key to encrypt and a private key to decrypt?", options: ["Symmetric", "Asymmetric", "Hashing", "Steganography"], correctIndex: 1, reasoning: "Asymmetric (Public Key) encryption uses a mathematically related key pair." },
            { id: 34, domain: "Architecture and Design", question: "What is the purpose of an 'Air Gap'?", options: ["Improve cooling", "Physically isolate a network", "Prevent RF interference", "Space between servers"], correctIndex: 1, reasoning: "An air gap ensures a sensitive network has no physical or wireless connection to the outside world." },
            { id: 35, domain: "Threats, Attacks, and Vulnerabilities", question: "An attack where the attacker spoofed Layer 2 addresses to redirect traffic is:", options: ["DNS Poisoning", "ARP Poisoning", "BGP Hijacking", "Smurf Attack"], correctIndex: 1, reasoning: "ARP poisoning associates an attacker's MAC address with a legitimate IP address on a local network." },
            { id: 36, domain: "Governance, Risk, and Compliance", question: "Auditors found active VPN accounts for former employees. Which process needs improvement?", options: ["Onboarding", "Offboarding", "Recertification", "Change Management"], correctIndex: 1, reasoning: "Offboarding ensures access is revoked when an employee leaves the organization." },
            { id: 37, domain: "Governance, Risk, and Compliance", question: "Which document provides independent verification of a cloud provider's security controls?", options: ["SLA", "MOU", "SOC 2 Type II", "NDA"], correctIndex: 2, reasoning: "SOC 2 reports are the industry standard for verifying service organization controls." },
            { id: 38, domain: "Architecture and Design", question: "Which describes 'Perfect Forward Secrecy' (PFS)?", options: ["Single key for all sessions", "Never changing keys", "Compromised long-term key doesn't affect past sessions", "Quantum-proof"], correctIndex: 2, reasoning: "PFS ensures that every session has a unique key that isn't derived from the server's long-term private key." },
            { id: 39, domain: "Threats, Attacks, and Vulnerabilities", question: "A process is using 99% CPU to mine cryptocurrency for an attacker. What is this?", options: ["Ransomware", "Cryptojacking", "Spyware", "Logic Bomb"], correctIndex: 1, reasoning: "Cryptojacking is the unauthorized use of a system's resources to mine digital currency." },
            { id: 40, domain: "Governance, Risk, and Compliance", question: "What is a primary goal of a 'Business Impact Analysis' (BIA)?", options: ["Identify all employees", "Determine criticality of functions", "Install fire suppression", "Perform pen tests"], correctIndex: 1, reasoning: "The BIA identifies critical business processes and the impact of their interruption." },
            { id: 41, domain: "Architecture and Design", question: "How can the CEO prove an email wasn't modified in transit and came from them?", options: ["Password ZIP", "Digital Signature", "Symmetric encryption", "Steganography"], correctIndex: 1, reasoning: "Digital signatures provide both integrity and non-repudiation." },
            { id: 42, domain: "Implementation", question: "A firewall rule specifically allowing traffic to Port 80 is an example of:", options: ["Implicit Deny", "Explicit Allow", "Stateless Filtering", "Intrusion Prevention"], correctIndex: 1, reasoning: "An explicit allow is a rule specifically created by an admin to permit traffic." },
            { id: 43, domain: "Threats, Attacks, and Vulnerabilities", question: "An attacker creates a fake AP with the same SSID as a legitimate one. What is this?", options: ["War Driving", "Evil Twin", "Bluejacking", "NFC Spoofing"], correctIndex: 1, reasoning: "An Evil Twin mimics a legitimate wireless network to intercept user data." },
            { id: 44, domain: "Implementation", question: "Which represents 'something you are' in authentication?", options: ["Hardware token", "Fingerprint scan", "Complex password", "GPS location"], correctIndex: 1, reasoning: "Biometrics like fingerprints represent the 'something you are' factor." },
            { id: 45, domain: "Implementation", question: "What is an isolated environment that mirrors production for final testing?", options: ["Production", "Staging", "Repository", "Baseline"], correctIndex: 1, reasoning: "Staging is the final sandbox used before code goes live." },
            { id: 46, domain: "Implementation", question: "Which prevents unauthorized data exfiltration via email or USB?", options: ["DLP", "NIDS", "Honeypot", "VPN"], correctIndex: 0, reasoning: "Data Loss Prevention (DLP) systems monitor and block the transfer of sensitive data." },
            { id: 47, domain: "Architecture and Design", question: "What is the purpose of 'Hashing' a file?", options: ["Compress size", "Ensure integrity", "Privacy/Encryption", "Speed up transfer"], correctIndex: 1, reasoning: "Hashing creates a unique fingerprint; if the file changes, the hash changes." },
            { id: 48, domain: "Operations and Incident Response", question: "A test where the tester has full knowledge of the target network is:", options: ["Black Box", "White Box", "Gray Box", "Red Teaming"], correctIndex: 1, reasoning: "White box testing involves full transparency of the target's internals." },
            { id: 49, domain: "Operations and Incident Response", question: "Which control detects an intruder after they have entered a building?", options: ["Fence", "Motion Sensor", "Bollard", "Signage"], correctIndex: 1, reasoning: "Motion sensors are detective controls used to alert security of movement inside." },
            { id: 50, domain: "Threats, Attacks, and Vulnerabilities", question: "Trying one common password against many different usernames is called:", options: ["Brute Force", "Password Spraying", "Social Engineering", "Keylogging"], correctIndex: 1, reasoning: "Password spraying avoids account lockouts by only trying one password per account." },
            { id: 51, domain: "Architecture and Design", question: "Unauthorized virtual machines created without change management records is:", options: ["Cloud Bursting", "Resource Exhaustion", "VM Sprawl", "Containerization"], correctIndex: 2, reasoning: "VM sprawl occurs when virtual machines are created but not decommissioned or tracked." },
            { id: 52, domain: "Architecture and Design", question: "Which describes 'Active-Passive' clustering?", options: ["Both handle traffic", "One handles traffic, one standby", "Different regions", "Backup is off"], correctIndex: 1, reasoning: "In Active-Passive, only the primary server is active; the secondary waits for a failure." },
            { id: 53, domain: "Threats, Attacks, and Vulnerabilities", question: "Using a stolen session token to impersonate a user is:", options: ["Session Hijacking", "Credential Stuffing", "Phishing", "Privilege Escalation"], correctIndex: 0, reasoning: "Session hijacking involves taking over an already authenticated web session." },
            { id: 54, domain: "Implementation", question: "A tool that captures and displays the contents of network packets is a:", options: ["Vulnerability Scanner", "Protocol Analyzer", "Port Scanner", "Honeypot"], correctIndex: 1, reasoning: "Protocol Analyzers (like Wireshark) provide deep packet inspection." },
            { id: 55, domain: "Architecture and Design", question: "What is a primary benefit of 'Infrastructure as Code' (IaC)?", options: ["Faster network", "Consistent/Repeatable deployments", "No firewalls needed", "Malware prevention"], correctIndex: 1, reasoning: "IaC automates infrastructure setup via scripts, ensuring consistency." },
            { id: 56, domain: "Operations and Incident Response", question: "Which document tracks who handled evidence to keep it admissible in court?", options: ["Incident Response Plan", "Chain of Custody", "SLA", "Legal Hold"], correctIndex: 1, reasoning: "The Chain of Custody is a chronological record of evidence handling." },
            { id: 57, domain: "Threats, Attacks, and Vulnerabilities", question: "Which is a symptom of a 'Rootkit'?", options: ["Ransom note", "Files/Processes hidden from OS", "Pop-up ads", "Fast fan speed"], correctIndex: 1, reasoning: "Rootkits modify the OS to hide their presence and activity." },
            { id: 58, domain: "Operations and Incident Response", question: "Which group simulates an attack to test incident response?", options: ["Blue Team", "Red Team", "White Team", "Purple Team"], correctIndex: 1, reasoning: "The Red Team acts as the adversary in a security exercise." },
            { id: 59, domain: "Implementation", question: "Which protocol securely monitors and manages network devices?", options: ["SNMPv3", "HTTP", "FTP", "Telnet"], correctIndex: 0, reasoning: "SNMPv3 adds encryption and authentication to network management." },
            { id: 60, domain: "Threats, Attacks, and Vulnerabilities", question: "An email from a bank asking to click a link and 'verify' an account is:", options: ["Phishing", "Vishing", "Smishing", "Whaling"], correctIndex: 0, reasoning: "Phishing is a fraudulent email used to steal information." },
            { id: 61, domain: "Architecture and Design", question: "How can a company prevent a single point of failure for their internet?", options: ["RAID 5", "Dual-homing separate ISPs", "UPS", "Load Balancer"], correctIndex: 1, reasoning: "Redundant ISP connections ensure internet availability if one fails." },
            { id: 62, domain: "Operations and Incident Response", question: "Which is a detective control used to find unauthorized wireless APs?", options: ["WPA3", "Wireless Site Audit", "SSID Hiding", "MAC Filtering"], correctIndex: 1, reasoning: "Site audits and scans detect rogue APs that aren't supposed to be there." },
            { id: 63, domain: "Operations and Incident Response", question: "What is the purpose of a 'Degausser'?", options: ["Shred a drive", "Scramble magnetic data", "Overwrite with zeros", "Incinerate drive"], correctIndex: 1, reasoning: "Degaussing uses magnetic fields to erase data from HDDs and tapes." },
            { id: 64, domain: "Operations and Incident Response", question: "Which command is used to check for open ports on a server?", options: ["ping", "nmap", "nslookup", "tracert"], correctIndex: 1, reasoning: "Nmap is the industry standard tool for port scanning." },
            { id: 65, domain: "Governance, Risk, and Compliance", question: "Employees using cloud apps without IT approval is called:", options: ["Cloud Bursting", "Shadow IT", "Dark Web", "Managed Services"], correctIndex: 1, reasoning: "Shadow IT refers to unauthorized software or hardware used by staff." }
        ];

        let currentIdx = 0;
        let userAnswers = JSON.parse(localStorage.getItem('secPlusAnswers')) || {};
        let flagged = JSON.parse(localStorage.getItem('secPlusFlags')) || [];
        let timeLeft = parseInt(localStorage.getItem('secPlusTimer')) || 3600;
        let isSubmitted = localStorage.getItem('secPlusSubmitted') === 'true';
        let timerInterval;

        function init() {
            renderMap();
            renderQuestion();
            if (!isSubmitted) {
                startTimer();
            } else {
                showResultsScreen();
            }
        }

        function startTimer() {
            timerInterval = setInterval(() => {
                timeLeft--;
                localStorage.setItem('secPlusTimer', timeLeft);
                const mins = Math.floor(timeLeft / 60);
                const secs = timeLeft % 60;
                document.getElementById('timer').innerText = `${mins}:${secs < 10 ? '0' : ''}${secs}`;
                
                if (timeLeft <= 0) {
                    clearInterval(timerInterval);
                    finishExam();
                }
            }, 1000);
        }

        function renderQuestion() {
            const q = examData[currentIdx];
            const container = document.getElementById('quiz-container');
            
            let optionsHTML = q.options.map((opt, i) => `
                <div onclick="${isSubmitted ? '' : `selectAnswer(${i})`}" 
                     class="p-4 border-2 rounded-xl mb-3 cursor-pointer transition-all ${userAnswers[currentIdx] == i ? 'border-sky-500 bg-sky-50' : 'border-slate-200 hover:border-slate-300'} 
                     ${isSubmitted && i === q.correctIndex ? 'border-green-500 bg-green-50 ring-2 ring-green-200' : ''}
                     ${isSubmitted && userAnswers[currentIdx] == i && i !== q.correctIndex ? 'border-red-500 bg-red-50' : ''}">
                    <span class="font-bold mr-2">${String.fromCharCode(65 + i)}.</span> ${opt}
                </div>
            `).join('');

            container.innerHTML = `
                <div class="flex justify-between items-start mb-4">
                    <span class="text-xs font-bold px-2 py-1 bg-slate-100 text-slate-500 rounded uppercase tracking-wider">${q.domain}</span>
                    <span class="text-sm text-slate-400">Question ${currentIdx + 1} of ${examData.length}</span>
                </div>
                <h3 class="text-xl font-semibold text-slate-800 mb-8">${q.question}</h3>
                <div class="space-y-2">${optionsHTML}</div>
                ${isSubmitted ? `<div class="mt-6 p-4 bg-slate-50 rounded-lg border-l-4 border-sky-500 text-sm"><strong>Reasoning:</strong> ${q.reasoning}</div>` : ''}
            `;

            updateButtons();
            renderMap();
        }

        function selectAnswer(i) {
            userAnswers[currentIdx] = i;
            localStorage.setItem('secPlusAnswers', JSON.stringify(userAnswers));
            renderQuestion();
        }

        function toggleFlag() {
            if (flagged.includes(currentIdx)) {
                flagged = flagged.filter(f => f !== currentIdx);
            } else {
                flagged.push(currentIdx);
            }
            localStorage.setItem('secPlusFlags', JSON.stringify(flagged));
            renderMap();
        }

        function nextQuestion() {
            if (currentIdx < examData.length - 1) {
                currentIdx++;
                renderQuestion();
            }
        }

        function prevQuestion() {
            if (currentIdx > 0) {
                currentIdx--;
                renderQuestion();
            }
        }

        function renderMap() {
            const map = document.getElementById('question-map');
            map.innerHTML = examData.map((_, i) => `
                <button onclick="jumpTo(${i})" 
                    class="w-full aspect-square text-xs font-bold rounded border transition-all 
                    ${currentIdx === i ? 'ring-2 ring-sky-500 scale-110 z-10' : ''} 
                    ${userAnswers[i] !== undefined ? 'answered' : 'bg-white text-slate-400'} 
                    ${flagged.includes(i) ? 'flagged' : ''}">
                    ${i + 1}
                </button>
            `).join('');
        }

        function jumpTo(i) {
            currentIdx = i;
            renderQuestion();
        }

        function updateButtons() {
            document.getElementById('prev-btn').disabled = (currentIdx === 0);
            const nextBtn = document.getElementById('next-btn');
            const finishBtn = document.getElementById('finish-btn');
            
            if (currentIdx === examData.length - 1 && !isSubmitted) {
                nextBtn.classList.add('hidden');
                finishBtn.classList.remove('hidden');
            } else {
                nextBtn.classList.remove('hidden');
                finishBtn.classList.add('hidden');
            }
        }

        function finishExam() {
            clearInterval(timerInterval);
            isSubmitted = true;
            localStorage.setItem('secPlusSubmitted', 'true');
            showResultsScreen();
            renderQuestion();
        }

        function showResultsScreen() {
            let correct = 0;
            examData.forEach((q, i) => {
                if (userAnswers[i] == q.correctIndex) correct++;
            });

            const rawScore = Math.round((correct / examData.length) * 900);
            const passed = rawScore >= 750;

            document.getElementById('results-modal').style.display = 'flex';
            document.getElementById('pass-fail-text').innerText = passed ? "CONGRATULATIONS - PASS" : "FAIL - KEEP STUDYING";
            document.getElementById('pass-fail-text').className = passed ? "text-3xl font-black mb-2 text-green-600" : "text-3xl font-black mb-2 text-red-600";
            document.getElementById('final-score').innerText = `${rawScore}/900`;
            document.getElementById('score-details').innerText = `You got ${correct} out of ${examData.length} questions correct.`;
        }

        function closeResults() {
            document.getElementById('results-modal').style.display = 'none';
        }

        function resetExam() {
            localStorage.clear();
            location.reload();
        }

        init();
    </script>
</body>
</html>
